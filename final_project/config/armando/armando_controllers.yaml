arm:
  controller_manager:
    ros__parameters:
      update_rate: 250
      
      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster
      
      position_controller:
        type: position_controllers/JointGroupPositionController
      
      gripper_controller:
        type: position_controllers/JointGroupPositionController

  position_controller:
    ros__parameters:
      joints:
        - arm_j0
        - arm_j1
        - arm_j2
        - arm_j3

  gripper_controller:
    ros__parameters:
      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity
      joints:
        - arm_gripper_left_joint
        - arm_gripper_right_joint
      state_publish_rate: 250.0

    
